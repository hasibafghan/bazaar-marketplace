{% extends 'include/base.html' %}
{% load static %}
{% block content %}
{% load i18n %}
  <!-- ========================= SECTION CONTENT ========================= -->
  <section class="section-conten padding-y" style="min-height:84vh">
    <!-- ============================ COMPONENT LOGIN ================================= -->
    <div class="card mx-auto" style="max-width: 380px; margin-top:100px;">
      <div class="card-body">
        <h4 class="card-title mb-4">{% trans "Reset Password" %}</h4>
        {% include 'include/alerts.html' %}

        <form method="POST" action="{% url 'reset_password' %}">
          {% csrf_token %}
          <div class="form-group">
            <input type="password" class="form-control" required placeholder="{% trans 'Password' %}" name="password" />
          </div> <!-- form-group// -->
          <div class="form-group">
            <input type="password" class="form-control" required placeholder="{% trans 'Confirm Password' %}" name="confirm_password" />
          </div> <!-- form-group// -->

          <div class="form-group">
            <button type="submit" class="btn btn-primary w-100">{% trans "Reset" %}</button>
          </div> <!-- form-group// -->
        </form>
      </div> <!-- card-body.// -->
    </div> <!-- card .// -->

    <p class="text-center mt-4">
      {% trans "Don't have account?" %} <a href="{% url 'register_user' %}">{% trans "Sign up" %}</a>
    </p>
    <br /><br />
    <!-- ============================ COMPONENT LOGIN END.// ================================= -->
  </section>
  <!-- ========================= SECTION CONTENT END// ========================= -->
{% endblock %}
