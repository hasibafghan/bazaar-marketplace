<aside class="col-md-3">
  {% load i18n %}
  <!-- SIDEBAR -->
  <ul class="list-group">
    <a class="list-group-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">{% trans "Dashboard" %}</a>
    <a class="list-group-item {% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}" href="{% url 'my_orders' %}">{% trans "My Orders" %}</a>
    <a class="list-group-item {% if request.resolver_match.url_name == 'edit_profile' %}active{% endif %}" href="{% url 'edit_profile' %}">{% trans "Edit Profile" %}</a>
    <a class="list-group-item {% if request.resolver_match.url_name == 'change_password' %}active{% endif %}" href="{% url 'change_password' %}">{% trans "Change Password" %}</a>
  </ul>
  <br />
  <a class="btn btn-light w-100" href="{% url 'logout_user' %}"><i class="fa fa-power-off"></i> <span class="text">{% trans "Log out" %}</span></a>
  <!-- SIDEBAR .//END -->
</aside>
